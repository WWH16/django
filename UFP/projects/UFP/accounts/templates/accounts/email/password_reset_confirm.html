{% extends 'accounts/email/email_base.html' %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; padding-top: 2rem;">
  <div style="max-width: 384px; width: 100%;">
    <h3 style="font-size: 1.25rem; font-weight: bold;">Reset Your Password</h3>
    <p style="font-size: 0.95rem; color: #555;">Enter your new password below.</p>

    <div id="message-container"></div>
    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <form id="reset-password-form" method="post" style="width: 100%; margin-top: 1rem;">
      {% csrf_token %}
      <input type="hidden" id="token" name="token" value="{{ token }}">

      <label for="new_password" class="form-label">New Password *</label>
      <input type="password" id="new_password" name="new_password" class="form-input" required>

      <label for="new_password_confirmation" class="form-label" style="margin-top: 1rem;">Confirm New Password *</label>
      <input type="password" id="new_password_confirmation" name="new_password_confirmation" class="form-input" required>

      <button type="submit" class="btn-primary" style="margin-top: 1rem; width: 100%;">Change Password</button>
    </form>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('reset-password-form');
    const messageContainer = document.getElementById('message-container');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        messageContainer.innerHTML = '';

        const newPassword = document.getElementById('new_password').value;
        const newPasswordConfirm = document.getElementById('new_password_confirmation').value;
        const token = document.getElementById('token').value;
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        if (newPassword !== newPasswordConfirm) {
            messageContainer.innerHTML = '<div class="error-message">Passwords do not match!</div>';
            return;
        }

        try {
            const response = await fetch('/accounts/api/password_reset/confirm/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ token: token, password: newPassword })
            });

            const data = await response.json();

            if (response.ok) {
                messageContainer.innerHTML = `<div class="success-message">Password successfully changed! You can now <a href="{% url 'login_student' %}">log in</a>.</div>`;
                form.reset();
            } else {
                let errorMsg = 'An error occurred. Please try again.';
                if (data.non_field_errors) errorMsg = data.non_field_errors.join(' ');
                else if (data.token) errorMsg = data.token.join(' ');
                else if (data.password) errorMsg = data.password.join(' ');
                messageContainer.innerHTML = `<div class="error-message">${errorMsg}</div>`;
            }
        } catch (error) {
            console.error(error);
            messageContainer.innerHTML = '<div class="error-message">Network error. Please try again.</div>';
        }
    });
});
</script>

<style>
.error-message {
    color: #dc3545;
    background-color: #f8d7da;
    border: 1px solid #f5c6cb;
    padding: 0.75rem;
    border-radius: 0.25rem;
    margin-top: 0.5rem;
    font-size: 0.875rem;
}

.success-message {
    color: #155724;
    background-color: #d4edda;
    border: 1px solid #c3e6cb;
    padding: 0.75rem;
    border-radius: 0.25rem;
    margin-top: 0.5rem;
    font-size: 0.875rem;
}
</style>
{% endblock %}
