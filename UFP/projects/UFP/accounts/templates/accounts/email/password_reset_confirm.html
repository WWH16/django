{% extends 'accounts/email/email_base.html' %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; padding-top: 2rem;">
  <div style="max-width: 384px; width: 100%;">
    <h3 style="font-size: 1.25rem; font-weight: bold;">Reset Your Password</h3>
    <p style="font-size: 0.95rem; color: #555;">Enter your new password below.</p>

    {% if error %}
      <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="post" style="width: 100%; margin-top: 1rem;">
      {% csrf_token %}
      <input type="hidden" name="token" value="{{ token }}">

      <label for="new_password" class="form-label">New Password *</label>
      <div class="password-container">
          <input type="password" id="new_password" name="new_password" class="form-input" required>
          <button type="button" class="password-toggle" onclick="togglePassword('new_password', 'eye-icon-new')">
              <span class="material-symbols-outlined" id="eye-icon-new">visibility_off</span>
          </button>
      </div>

      <label for="new_password_confirmation" class="form-label" style="margin-top: 1rem;">Confirm New Password *</label>
      <div class="password-container">
          <input type="password" id="new_password_confirmation" name="new_password_confirmation" class="form-input" required>
          <button type="button" class="password-toggle" onclick="togglePassword('new_password_confirmation', 'eye-icon-confirm')">
              <span class="material-symbols-outlined" id="eye-icon-confirm">visibility_off</span>
          </button>
      </div>

      <button type="submit" class="btn-primary" style="margin-top: 1rem; width: 100%;">Change Password</button>
    </form>
  </div>
</div>

<script>
function togglePassword(inputId, iconId) {
    const passwordField = document.getElementById(inputId);
    const eyeIcon = document.getElementById(iconId);

    if (passwordField.type === 'password') {
        passwordField.type = 'text';
        eyeIcon.textContent = 'visibility';
    } else {
        passwordField.type = 'password';
        eyeIcon.textContent = 'visibility_off';
    }
}
</script>

<style>
.error-message {
    color: #dc3545;
    background-color: #f8d7da;
    border: 1px solid #f5c6cb;
    padding: 0.75rem;
    border-radius: 0.25rem;
    margin-top: 0.5rem;
    font-size: 0.875rem;
}

.password-container {
    position: relative;
    display: flex;
    align-items: center;
}

.password-input {
    padding-right: 45px;
    width: 100%;
}

.password-toggle {
    position: absolute;
    right: 12px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6b7280;
    transition: color 0.2s ease;
    z-index: 10;
}

.password-toggle:hover {
    color: #374151;
}

.password-toggle:focus {
    outline: none;
}

#eye-icon-new, #eye-icon-confirm {
    font-size: 20px;
    user-select: none;
}

.btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
</style>
{% endblock %}
