{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Email - Sentiment Analysis{% endblock %}</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols (for arrow icons) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="icon" href="{% static 'system/images/logo1.png' %}" type="image/x-icon">
    <style>
        *, *:before, *:after { box-sizing: border-box; }
        body { font-family: 'Inter', Arial, sans-serif; background: #fff; min-height: 100vh; }
        .flex-center { display: flex; min-height: 100vh; align-items: flex-start; justify-content: center; position: relative; padding-top: 5%; } /* Adjusted alignment and added padding */
        .card { width: 100%; max-width: 384px; margin: 0 auto; background: #fff; box-sizing: border-box; }
        .divider { border-bottom: 1px solid #e5e7eb; width: 100%; margin: 0 0 0px 0; padding: 0 0 0px 0; } /* Reduced margin and padding to decrease space */
        .header-title { font-size: 1.1rem; font-weight: 600; color: #009900; letter-spacing: -0.5px; }
        .header-sub { color: #000000; font-size: 0.85rem; font-weight: 600; padding-bottom: 2px; }
        .form-label { font-size: 0.9rem; font-weight: 600; color: #222; margin-bottom: 2px; }
        .form-required { color: #ef4444; }
        .form-input { border: 1px solid #e5e7eb; background: #fff; border-width: 2px; font-size: 0.85rem; font-weight: 500; border-radius: 0.4rem; padding: 0.5rem 0.6rem; margin-top: 0.25rem; margin-bottom: 0.25rem; width: 100%; }
        .form-input:focus { border-color: #009900; outline: none; border-width: 2px; }
        .field-error {
            padding: 12px;
            border-radius: 6px;
            background-color: #ffdcdc;
            border: 1px solid #ffdcdc;
            color: #b91c1c;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-primary { background: #009900; color: #fff; font-weight: 600; border: none; border-radius: 0.4rem; padding: 0.7em 0.75em; width: 100%; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 0.4rem; cursor: pointer; transition: background 0.2s; }
        .btn-primary .arrow { left: 0; transition: left 0.2s; position: relative; }
        .btn-primary:hover .arrow { left: 4px; }

        .arrow { font-family: 'Material Symbols Outlined'; font-size: 0.9rem; vertical-align: middle; transition: right 0.2s, left 0.2s; position: relative; right: 0; left: 0; }
        .back-link { display: flex; align-items: center; gap: 0.45rem; font-weight: 500; color: #009900; text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
        .back-link .arrow { left: 0; transition: left 0.2s; }
        .back-link:hover .arrow { left: -4px; }


        @media (max-width: 480px) {
            .card { max-width: 100%; padding: 0 0.5rem; }
            .divider { margin-bottom: 16px; padding-bottom: 12px; }
            .header-title { font-size: 1.125rem; }  /* 18px - better hierarchy */
            .form-label { font-size: 0.85rem; }    /* 14px - more readable */
            .btn-primary { font-size: 0.85rem; }       /* 16px - standard button size */
            .arrow { font-size: 0.85rem; }             /* 16px - matches button text */
        }

        .btn-select {
            background: #fff;
            color: #009900;
            font-weight: 600;
            border: 1.5px solid #009900;
            border-radius: 0.4rem;
            padding: 0.7em 0.75em;
            width: 100%;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            cursor: pointer;
            margin-top: 0.7rem;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            text-decoration: none;
        }
        .btn-select:hover { background: #009900; color: #fff; border-color: #009900; }


        .info-text {
            text-align: center;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #888; /* Muted gray */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="flex-center">
        <div class="card">
            <!-- Header & Divider -->
            <div class="divider">
                <h1 class="header-title">
                    <span header-sub style="font-weight:600; margin-bottom: 0%">{% block header_title %}Forgot Password{% endblock %}</span>
                </h1>
            </div>
            {% block content %}{% endblock %}
        </div>
    </div>
    {% block extra_js %}{% endblock %}
</body>
</html>
