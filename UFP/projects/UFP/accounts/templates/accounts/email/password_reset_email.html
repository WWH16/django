<!DOCTYPE html>
<html>
<head>
    <title>Password Reset Email</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'path/to/bootstrap.css' %}">
</head>
<body>
<div style="display: flex; flex-direction: column; align-items: center; margin-top: 5%;"> <!-- Adjusted alignment and margin to move content slightly down -->
  <div style="width: 100%; max-width: 384px;">
    <h2>Password Reset Email</h2>
    <p>Hello,</p>
    <p>We've received a request to reset your password. Please click on the link below to reset your password:</p>
    <p><a href="{{ reset_password_url }}" class="btn-primary" style="margin-top: 1rem;">Reset Password</a></p>
    <p>If you did not request this password reset, you can safely ignore this email.</p>
    <p>Best regards,</p>
    <p>Your Application Team</p>
  </div>
</div>
</body>
</html>
