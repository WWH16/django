{% extends 'accounts/email/email_base.html' %}
{% block content %}
<style>
  .btn-primary:disabled {
    opacity: 0.5; /* Reduce opacity to indicate disabled state */
    cursor: not-allowed; /* Show 'not-allowed' cursor */
  }
  .error-message {
    color: #dc3545;
    font-size: 0.875rem;
    margin-top: 0.5rem;
    padding: 0.75rem;
    background-color: #f8d7da;
    border: 1px solid #f5c6cb;
    border-radius: 0.25rem;
  }
  .success-message {
    color: #155724;
    font-size: 0.875rem;
    margin-top: 0.5rem;
    padding: 0.75rem;
    background-color: #d4edda;
    border: 1px solid #c3e6cb;
    border-radius: 0.25rem;
  }
</style>
<div> <!-- Adjusted alignment and margin to move content slightly down -->
  <p>Enter your email address below, and we'll send you instructions to reset your password.</p>
  
  <!-- Message container for success/error messages -->
  <div id="message-container"></div>
  
  <form id="password-reset-form" method="post">
    {% csrf_token %}
    <label for="email" class="form-label">Email <span class="form-required">*</span></label>
    <input type="email" id="email" name="email" class="form-input" required>
    <div style="margin-top: 1rem;"> <!-- Added spacing between input and button -->
      <button id="login-submit" type="submit" class="btn-primary">
        <span id="button-text">Reset password</span>
        <span class="material-symbols-outlined arrow" id="arrow-icon">arrow_forward</span>
      </button>
    </div>
  </form>
  <p style="font-size: 0.85rem;">If you remember your password, you can <a href="{% url 'login_student' %}" style="color: #009900; text-decoration: underline;">log in here</a>.</p>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('password-reset-form');
    const button = document.getElementById('login-submit');
    const buttonText = document.getElementById('button-text');
    const arrowIcon = document.getElementById('arrow-icon');
    const messageContainer = document.getElementById('message-container');
    
    form.addEventListener('submit', async function(e) {
        e.preventDefault(); // IMPORTANT: Prevent default form submission
        
        // Clear previous messages
        messageContainer.innerHTML = '';
        
        // Get form data
        const email = document.getElementById('email').value;
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        
        // Disable button and show loading state
        button.disabled = true;
        button.style.cursor = 'not-allowed';
        buttonText.textContent = 'Processing...';
        arrowIcon.textContent = 'hourglass_empty';
        
        try {
            // Call YOUR API instead of Django's built-in system
            const response = await fetch('/accounts/api/forgot-password/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({
                    email: email
                })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                // Success - show success message
                messageContainer.innerHTML = `<div class="success-message">${data.message}</div>`;
                form.reset(); // Clear the form
            } else {
                // Error - show error message
                let errorMsg = 'An error occurred. Please try again.';
                if (data.email && data.email.length > 0) {
                    errorMsg = data.email[0];
                }
                messageContainer.innerHTML = `<div class="error-message">${errorMsg}</div>`;
            }
        } catch (error) {
            console.error('Error:', error);
            messageContainer.innerHTML = '<div class="error-message">Network error. Please try again.</div>';
        } finally {
            // Re-enable button
            button.disabled = false;
            button.style.cursor = 'pointer';
            buttonText.textContent = 'Reset password';
            arrowIcon.textContent = 'arrow_forward';
        }
    });
});
</script>
{% endblock %}
