<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Login Type - Sentiment Analysis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols (for arrow icons) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        *, *:before, *:after {
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #fff;
            min-height: 100vh;
        }
        .flex-center {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .card {
            width: 100%;
            max-width: 384px;
            margin: 0 auto;
            background: #fff;
            box-sizing: border-box;
        }
        .divider {
            border-bottom: 1px solid #e5e7eb;
            width: 100%;
            margin: 0 0 30px 0;
            padding: 0 0 20px 0;
        }
        .header-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #009900;
            letter-spacing: -0.5px;
        }
        .header-sub {
            color: #000000;
            font-size: 0.91rem;
            font-weight: 600;
            padding-bottom: 2px;
        }
        .btn-select {
            background: #fff;
            color: #747474;
            font-weight: 600;
            border: 1.5px solid #009900;
            border-radius: 0.4rem;
            padding: 0.7em 0.75em;
            width: 100%;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            cursor: pointer;
            margin-bottom: 0.7rem;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            text-decoration: none;
        }
        .btn-select:hover {
            background: #009900;
            color: #fff;
            border-color: #009900;
        }
        .divider-or {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 18px 0;
            font-size: 0.93rem;
            color: #888;
            gap: 0.7rem;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }
        .info-text {
            text-align: center;
            margin-top: 10px;
            font-size: 0.89rem;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }
        .top-bar {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 0.6rem 0.4rem;
            z-index: 15;
        }
        .back-link {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            font-weight: 500;
            color: #009900;
            text-decoration: none;
            font-size: 0.89rem;
            transition: color 0.2s;
        }
        .back-link .arrow {
            left: 0;
            transition: left 0.2s;
        }
        .back-link:hover .arrow {
            left: -4px;
        }
        @media (max-width: 480px) {
            .card {
                max-width: 100%;
                padding: 0 0.3rem;
            }
            .top-bar {
                padding: 0.4rem 0.4rem;
            }
            .divider {
                margin-bottom: 16px;
                padding-bottom: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="flex-center">
        <!-- Top Bar with Back Arrow -->
        <div class="top-bar">
            <a href="/" class="back-link">
                <span class="material-symbols-outlined arrow">arrow_back</span>
                Return to site
            </a>
        </div>
        <div class="card">
            <!-- Header & Divider -->
            <div class="divider">
                <h1 class="header-title">
                    <span class="header-sub" style="display:block;">Welcome</span>
                    <span style="font-weight:600;">Sentiment Analysis Platform</span>
                </h1>
            </div>
            <!-- Login Options -->
            <a href="{% url 'login_admin' %}" class="btn-select">
                Admin Login
            </a>
            <a href="{% url 'login_student' %}" class="btn-select">
                Student Login
            </a>
            <div class="divider-or">
                <span class="divider-line"></span>
                Or
                <span class="divider-line"></span>
            </div>
            <a href="{% url 'register' %}" class="btn-select">
                Register as Student
            </a>
            <div class="info-text">
                <i class="material-symbols-outlined" style="font-size:1rem;">info</i>
                Choose the appropriate option based on your role
            </div>
        </div>
    </div>
</body>
</html>
