  <!-- Leadership Section -->
  {% load static %}
  <style>
    /* Enhanced Team Section Styles */
    .team-section { background: #f7f9f8; position: relative; }
    
  .section-heading {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 1rem;
    color: #006600 !important;
    background: none !important;
    -webkit-background-clip: initial !important;
    -webkit-text-fill-color: initial !important;
    background-clip: initial !important;
  }

    
    .section-subtitle { font-size: 1.25rem; font-weight: 600; margin-bottom: .5rem; color: #10b981; position: relative; }
    
    .section-subtitle::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, #08915e, #0bbf7a);
      border-radius: 2px;
    }
    
    .section-description {
      font-size: 1rem;
      line-height: 1.6;
      color: #6c757d;
    }
    
    .leader-card { 
      transition: transform .15s ease, border-color .15s ease; 
      border: 1px solid rgba(0,0,0,0.06); 
      position: relative; 
      overflow: hidden; 
      box-shadow: none; 
    }
    
    .leader-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(8, 145, 94, 0.05), transparent);
      transition: left 0.6s ease;
    }
    
    .leader-card:hover::before {
      left: 100%;
    }
    
    .leader-image {
      padding: 20px;
      position: relative;
    }
    
    .leader-image img {
      width: 100%;
      height: auto;
      max-height: 250px;
      object-fit: cover;
      object-position: top center;
      margin: 0 auto;
      border-radius: 12px;
      background: #ffffff;
      transition: all 0.4s ease;
    }
    
    .leader-card:hover { 
      transform: translateY(-2px); 
      border-color: rgba(0,0,0,0.12); 
    }

    .leader-card:hover .leader-image img {
      transform: scale(1.05);
    }

    .team-section .social-links { 
      background: rgba(0,0,0,0.45); 
      backdrop-filter: blur(6px); 
    }

    /* Show social icons only on image hover */
    .leader-image .social-links {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      opacity: 0;
      visibility: hidden;
      transform: translateY(6px);
      transition: opacity .2s ease, transform .2s ease, visibility .2s ease;
    }
    .leader-image:hover .social-links {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .team-section .social-links a {
      opacity: 0.8;
      transition: all 0.3s ease;
      color: white !important;
    }

    .team-section .social-links a:hover {
      opacity: 1;
      transform: translateY(-3px) scale(1.1);
      color: white !important;
    }

    .leader-info h4 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #006600;
    }

    .leader-info .position {
      font-size: 0.875rem;
      font-weight: 500;
      color: #08915e;
    }

    .leader-info .bio {
      font-size: 0.875rem;
      line-height: 1.6;
      color: #6c757d;
    }

    .about-image img {
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .about-image:hover img {
      transform: scale(1.02);
    }

    @media (max-width: 768px) {
      .leader-card {
        margin-bottom: 0.75rem;
        padding: 1rem !important;
      }
      
      .leader-image {
        padding: 10px !important;
      }
      
      .leader-image img {
        max-height: 200px !important;
        object-fit: contain !important;
        object-position: center center !important;
      }

      .section-heading {
        font-size: 2rem !important;
      }

      .section-subtitle {
        font-size: 1.25rem !important;
      }

      .leader-info h4 {
        font-size: 1.1rem !important;
      }

      .leader-info .position {
        font-size: 0.875rem !important;
      }

      .leader-info .bio {
        font-size: 0.875rem !important;
      }
    }
  </style>
