{% extends 'studentDashboard/feedback_form.html' %}
{% block dashboard_content %}

<style>
  .cp-wrap { padding: 2.5rem 2rem; max-width: 480px; }

  .cp-msg {
    font-size: .82rem; font-weight: 600; padding: .6rem 1rem;
    margin-bottom: 1.25rem; border-left: 3px solid;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }

  .cp-field { margin-bottom: 1.1rem; }
  .cp-label {
    font-size: .68rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: #9ca3af;
    display: block; margin-bottom: .38rem;
  }
  .cp-input {
    width: 100%; border: 1px solid #e5e7eb;
    padding: .65rem .85rem; font-size: .88rem; font-weight: 500;
    outline: none; border-radius: 0; box-sizing: border-box;
    background: #fff; transition: border-color .15s;
  }
  .cp-input:focus { border-color: #006600; }

  .cp-submit {
    width: 100%; margin-top: .5rem;
    font-size: .78rem; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; padding: .75rem;
    border: none; background: #006600; color: #fff;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,102,0,.2);
    transition: box-shadow .15s, background .15s;
  }
  .cp-submit:hover { background: #004d00; box-shadow: 0 4px 16px rgba(0,102,0,.28); }

  .cp-back {
    display: inline-block; margin-top: 1rem;
    font-size: .75rem; font-weight: 700; letter-spacing: .07em;
    text-transform: uppercase; color: #9ca3af; text-decoration: none;
    border-bottom: 1px solid #e5e7eb; padding-bottom: 1px;
    transition: color .15s, border-color .15s;
  }
  .cp-back:hover { color: #111; border-color: #111; }
</style>

<div class="cp-wrap">

  <!-- Page title -->
  <div style="margin-bottom: 2rem;">
    <h2 style="font-size: 1.5rem; font-weight: 800; color: #111; margin: 0 0 .2rem;">Change Password</h2>
    <p style="font-size: .83rem; color: #9ca3af; margin: 0;">Update your login credentials.</p>
  </div>

  <!-- Messages -->
  {% if messages %}
    {% for message in messages %}
    <div class="cp-msg" style="border-color:{% if 'success' in message.tags %}#006600{% else %}#dc2626{% endif %};background:{% if 'success' in message.tags %}#f0fdf4{% else %}#fef2f2{% endif %};color:{% if 'success' in message.tags %}#006600{% else %}#dc2626{% endif %};">
      {{ message }}
    </div>
    {% endfor %}
  {% endif %}

  <!-- Form card -->
  <div style="background:#fff;border:1px solid #e5e7eb;padding:1.5rem 1.5rem 1.75rem;box-shadow:0 1px 3px rgba(0,0,0,.05),0 4px 12px rgba(0,0,0,.06);border-top:3px solid #006600;">
    <form method="post" action="{% url 'change_password' %}">
      {% csrf_token %}

      <div class="cp-field">
        <label class="cp-label" for="old_password">Current Password</label>
        <input class="cp-input" type="password" id="old_password" name="old_password" required autocomplete="current-password">
      </div>

      <div class="cp-field">
        <label class="cp-label" for="new_password1">New Password</label>
        <input class="cp-input" type="password" id="new_password1" name="new_password1" required minlength="6" autocomplete="new-password">
      </div>

      <div class="cp-field">
        <label class="cp-label" for="new_password2">Confirm New Password</label>
        <input class="cp-input" type="password" id="new_password2" name="new_password2" required autocomplete="new-password">
      </div>

      <button type="submit" class="cp-submit">Update Password</button>
    </form>
  </div>

  <a href="{% url 'profile' %}" class="cp-back">← Back to profile</a>

</div>
{% endblock %}
