{% extends 'studentDashboard/feedback_form.html' %}
{% block dashboard_content %}
<div class="container py-4" style="background-color: #eeeeee; min-height: 100vh;">
  <h3 class="text-success mb-4" style="font-size: 1.3rem;">
    <i class="fas fa-user-circle"></i> My Profile
  </h3>

  <div class="card shadow-sm mb-4">
    <div class="card-body" style="font-size: 0.95rem;">
      <h5 class="card-title" style="font-size: 1.05rem;">Account Details</h5>
      <p style="font-size: 0.92rem;"><strong>Student ID:</strong> {{ user.username }}</p>
      <p style="font-size: 0.92rem;"><strong>Full Name:</strong> {{ user.first_name }}</p>
      <p style="font-size: 0.92rem;"><strong>Email:</strong> {{ user_email }}</p>
    </div>
  </div>

  <div class="d-flex gap-2">
    <a href="#" class="btn btn-outline-success btn-sm" data-bs-toggle="modal" data-bs-target="#editProfileModal" style="font-size: 0.92rem; min-width: 100px;">
      <i class="fas fa-pencil-alt"></i> Edit Profile
    </a>
    <a href="{% url 'change_password' %}" class="btn btn-success btn-sm" style="font-size: 0.92rem; min-width: 100px;">
      <i class="fas fa-key"></i> Change Password
    </a>
  </div>
</div>

<!-- Edit Profile Modal -->
<div class="modal fade" id="editProfileModal" tabindex="-1" aria-labelledby="editProfileModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form method="post" action="{% url 'edit_profile' %}">
        {% csrf_token %}
        <div class="modal-header">
          <h5 class="modal-title" id="editProfileModalLabel" style="font-size: 1.05rem;">Edit Profile</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" style="font-size: 0.92rem;">
          <div class="mb-3">
            <label for="first_name" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullname" name="fullname" value="{{ user.first_name }}" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" value="{{ user_email }}" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal" style="font-size: 0.92rem;">Cancel</button>
          <button type="submit" class="btn btn-success btn-sm" style="font-size: 0.92rem;">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
