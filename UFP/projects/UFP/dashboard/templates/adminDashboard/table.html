{% extends 'adminDashboard/dashboard_base.html' %}

{% block content %}
<div class="container-fluid">
    <h3 class="text-dark mb-4">Feedback Table</h3>
    <div class="card shadow">
        <div class="card-header py-3">
            <p class="text-dark m-0 fw-bold">Comments table</p>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <button id="showFactFeedback" class="btn btn-success btn-sm active-btn"
                style="background-color: #005500; border-color: #005500; color: #fff;"
                    type="button">
                    Services Feedback
                </button>
                <button id="showTeacherFeedback" class="btn btn-success btn-sm"
                style="background-color: #005500; border-color: #005500; color: #fff;"
                    type="button">
                    Teacher Evaluation
                </button>
            </div>
            <div class="row">
                <div class="col-md-6 text-nowrap">
                    <div id="dataTable_length" class="dataTables_length" aria-controls="dataTable">
                        <label class="form-label">Show&nbsp;<select class="d-inline-block form-select form-select-sm">
                                <option value="10" selected="">10</option>
                                <option value="25">25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>&nbsp;</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="text-md-end dataTables_filter" id="dataTable_filter"><label class="form-label"><input
                                type="search" class="form-control form-control-sm" aria-controls="dataTable"
                                placeholder="Search"></label></div>
                </div>
            </div>
            <!-- Make the table scrollable with a dynamic height -->
            <div class="table-responsive" style="height: 60vh; min-height: 250px; overflow-y: auto;">
                <table class="table my-0 text-dark" id="dataTable">
                    <thead id="table-head">
                        <tr>
                            <th>No.</th>
                            <th>Student</th>
                            <th>Service</th>
                            <th>Sentiment</th>
                            <th>Date</th>
                            <th>Comments</th>
                        </tr>
                    </thead>
                    <tbody id="feedback-table-body">
                        <!-- Data will be inserted here by JavaScript -->
                    </tbody>
                    <tfoot id="table-foot">
                        <tr>
                            <td><strong>No.</strong></td>
                            <td><strong>Student</strong></td>
                            <td><strong>Service</strong></td>
                            <td><strong>Sentiment</strong></td>
                            <td><strong>Date</strong></td>
                            <td><strong>Comments</strong></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            <div class="row">
                <div class="col-md-6 align-self-center">
                    <p id="dataTable_info" class="dataTables_info" role="status" aria-live="polite">
                        Showing all feedback</p>
                </div>
                <div class="col-md-6">
                    <nav class="d-lg-flex justify-content-lg-end dataTables_paginate paging_simple_numbers">
                        <ul class="pagination"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    let currentMode = 'fact'; // 'fact' or 'teacher'

    function setTableHeaders(mode) {
        const thead = document.getElementById('table-head');
        const tfoot = document.getElementById('table-foot');
        if (mode === 'teacher') {
            thead.innerHTML = `<tr>
            <th>No.</th>
            <th>Teacher</th>
            <th>Comments</th>
            <th>Sentiment</th>
            <th>Student</th>
            <th>Date</th>
        </tr>`;
            tfoot.innerHTML = `<tr>
            <td><strong>No.</strong></td>
            <td><strong>Teacher</strong></td>
            <td><strong>Comments</strong></td>
            <td><strong>Sentiment</strong></td>
            <td><strong>Student</strong></td>
            <td><strong>Date</strong></td>
        </tr>`;
        } else {
            thead.innerHTML = `<tr>
            <th>No.</th>
            <th>Service</th>
            <th>Comments</th>
            <th>Sentiment</th>
            <th>Student</th>
            <th>Date</th>
        </tr>`;
            tfoot.innerHTML = `<tr>
            <td><strong>No.</strong></td>
            <td><strong>Service</strong></td>
            <td><strong>Comments</strong></td>
            <td><strong>Sentiment</strong></td>
            <td><strong>Student</strong></td>
            <td><strong>Date</strong></td>
        </tr>`;
        }
    }

    function loadFeedback(page = 1, page_size = 10) {
        let url, renderRow;
        if (currentMode === 'fact') {
            url = `/api/fact-feedback/?page=${page}&page_size=${page_size}`;
            renderRow = item => `
            <tr>
                <td>${item.feedback_id}</td>
                <td>${item.service}</td>
                <td>${item.comments}</td>
                <td>${item.sentiment || ''}</td>
                <td>${item.student}</td>
                <td>${item.timestamp ? item.timestamp.split('T')[0] : ''}</td>
            </tr>
        `;
        } else {
            url = `/api/teacher-evaluations/?page=${page}&page_size=${page_size}`;
            renderRow = item => `
            <tr>
                <td>${item.evaluation_id}</td>
                <td>${item.teacher}</td>
                <td>${item.comments}</td>
                <td>${item.sentiment || ''}</td>
                <td>${item.student}</td>
                <td>${item.timestamp ? item.timestamp.split('T')[0] : ''}</td>
                
            </tr>
        `;
        }

        setTableHeaders(currentMode);

        fetch(url)
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('feedback-table-body');
                tbody.innerHTML = '';
                const items = data.results || data; // fallback to data if results is undefined
                if (Array.isArray(items)) {
                    items.forEach(item => {
                        tbody.innerHTML += renderRow(item);
                    });
                }

                // Pagination controls
                const pagination = document.querySelector('.pagination');
                pagination.innerHTML = '';
                const totalPages = Math.ceil(data.count / page_size);
                const maxPagesToShow = 5;
                let startPage = Math.max(1, page - Math.floor(maxPagesToShow / 2));
                let endPage = Math.min(totalPages, startPage + maxPagesToShow - 1);
                if (endPage - startPage < maxPagesToShow - 1) {
                    startPage = Math.max(1, endPage - maxPagesToShow + 1);
                }

                // Previous button
                pagination.innerHTML += `<li class="page-item${page === 1 ? ' disabled' : ''}">
                <a class="page-link" href="#" aria-label="Previous" onclick="loadFeedback(${page - 1},${page_size});return false;"><span aria-hidden="true">«</span></a>
            </li>`;

                // Page numbers
                for (let i = startPage; i <= endPage; i++) {
                    pagination.innerHTML += `<li class="page-item${i === page ? ' active' : ''}">
                    <a class="page-link" href="#" onclick="loadFeedback(${i},${page_size});return false;">${i}</a>
                </li>`;
                }

                // Next button
                pagination.innerHTML += `<li class="page-item${page === totalPages ? ' disabled' : ''}">
                <a class="page-link" href="#" aria-label="Next" onclick="loadFeedback(${page + 1},${page_size});return false;"><span aria-hidden="true">»</span></a>
            </li>`;
            });
    }

    // On page load
    document.addEventListener('DOMContentLoaded', function () {
        setTableHeaders(currentMode);
        loadFeedback();
        document.querySelector('select.form-select-sm').addEventListener('change', function () {
            loadFeedback(1, parseInt(this.value));
        });
        document.getElementById('showFactFeedback').addEventListener('click', function () {
            currentMode = 'fact';
            setTableHeaders(currentMode);
            loadFeedback();
            this.classList.add('btn-primary');
            this.classList.remove('btn-secondary');
            document.getElementById('showTeacherFeedback').classList.remove('btn-primary');
            document.getElementById('showTeacherFeedback').classList.add('btn-secondary');
        });
        document.getElementById('showTeacherFeedback').addEventListener('click', function () {
            currentMode = 'teacher';
            setTableHeaders(currentMode);
            loadFeedback();
            this.classList.add('btn-primary');
            this.classList.remove('btn-secondary');
            document.getElementById('showFactFeedback').classList.remove('btn-primary');
            document.getElementById('showFactFeedback').classList.add('btn-secondary');
        });

        // Simple client-side search for visible rows
        const searchBox = document.querySelector('#dataTable_filter input');
        searchBox.addEventListener('input', function () {
            const filter = this.value.toLowerCase();
            const rows = document.querySelectorAll('#feedback-table-body tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(filter) ? '' : 'none';
            });
        });
    });

    //for the two buttons
    document.getElementById('showFactFeedback').addEventListener('click', function () {
    this.classList.add('active-btn');
    document.getElementById('showTeacherFeedback').classList.remove('active-btn');
});
document.getElementById('showTeacherFeedback').addEventListener('click', function () {
    this.classList.add('active-btn');
    document.getElementById('showFactFeedback').classList.remove('active-btn');
});
</script>
{% endblock %}
