{% extends 'adminDashboard/dashboard_base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>My Activity Log</h2>
    <div style="height: 50vh; overflow-y: auto;">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Date/Time</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log.action_time|date:"Y-m-d h:i A" }}</td>
                    <td>{{ log.change_message|default:log.get_action_flag_display }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2">No activity found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
