{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
	<title>Dashboard - Brand</title>
	<link rel="stylesheet" href="{% static 'bootstrap/bootstrap.min.css' %}">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.12.0/css/all.css">
	<link rel="stylesheet" href="{% static 'css/styles.min.css' %}">
</head>
<body id="page-top">
	<div id="wrapper">
		<nav class="navbar navbar-dark align-items-start sidebar sidebar-dark accordion p-0" style="background-color: #006600;">
			<div class="container-fluid d-flex flex-column p-0"><a
					class="navbar-brand d-flex justify-content-center align-items-center sidebar-brand m-0" href="#" style="color: white;">
					<div class="sidebar-brand-icon rotate-n-15"><i class="fas fa-comments" style="color: white;"></i></div>
					<div class="sidebar-brand-text mx-3"><span>Admin panel</span></div>
				</a>
				<hr class="sidebar-divider my-0" style="border-color: rgba(255,255,255,0.2);">
				<ul class="navbar-nav text-light" id="accordionSidebar">
					<li class="nav-item"><a class="nav-link active" href="{% url 'admin_dashboard' %}" style="color: white;"><i
								class="fas fa-tachometer-alt"></i><span>Overview Dashboard</span></a></li>
					<li class="nav-item"><a class="nav-link" href="{% url 'osas_services' %}" style="color: rgba(255,255,255,0.8);"><i
								class="fas fa-building"></i><span>OSAS Services</span></a></li>
					<li class="nav-item"><a class="nav-link" href="{% url 'teacher_evaluation' %}" style="color: rgba(255,255,255,0.8);"><i
								class="fas fa-chalkboard-teacher"></i><span>Teacher Evaluation</span></a></li>
					<li class="nav-item"><a class="nav-link" href="{% url 'admin_reports' %}" style="color: rgba(255,255,255,0.8);"><i
								class="fas fa-table"></i><span>Table</span></a></li>
				</ul>
				<div class="text-center d-none d-md-inline"><button class="btn rounded-circle border-0"
						id="sidebarToggle" type="button" style="color: white;"></button></div>
			</div>
		</nav>
		<div class="d-flex flex-column" id="content-wrapper">
			<div id="content">
				<nav class="navbar navbar-light navbar-expand bg-white shadow mb-4 topbar static-top">
					<div class="container-fluid"><button class="btn btn-link d-md-none rounded-circle me-3"
							id="sidebarToggleTop" type="button"><i class="fas fa-bars"></i></button>
						<form class="d-none d-sm-inline-block me-auto ms-md-3 my-2 my-md-0 mw-100 navbar-search">
							<div class="input-group"><input class="bg-light form-control border-0 small" type="text"
									placeholder="Search for ..."><button class="btn py-0" type="button" style="background-color: #006600; color: white;"><i
										class="fas fa-search"></i></button></div>
						</form>
						<ul class="navbar-nav flex-nowrap ms-auto">
							<li class="nav-item dropdown d-sm-none no-arrow"><a class="dropdown-toggle nav-link"
									aria-expanded="false" data-bs-toggle="dropdown" href="#"><i
										class="fas fa-search"></i></a>
								<div class="dropdown-menu dropdown-menu-end p-3 animated--grow-in"
									aria-labelledby="searchDropdown">
									<form class="me-auto navbar-search w-100">
										<div class="input-group"><input class="bg-light form-control border-0 small"
												type="text" placeholder="Search for ...">
											<div class="input-group-append"><button class="btn py-0"
													type="button" style="background-color: #006600; color: white;"><i class="fas fa-search"></i></button></div>
										</div>
									</form>
								</div>
							</li>
							<div class="d-none d-sm-block topbar-divider"></div>
							<li class="nav-item dropdown no-arrow">
								<div class="nav-item dropdown no-arrow"><a class="dropdown-toggle nav-link"
										aria-expanded="false" data-bs-toggle="dropdown" href="#"><span
											class="d-none d-lg-inline me-2 text-gray-600 small">Valerie Luna</span><img
											class="border rounded-circle img-profile"
											src="{% static 'img/avatars/avatar1.jpeg' %}"></a>
									<div class="dropdown-menu shadow dropdown-menu-end animated--grow-in"><a
											class="dropdown-item" href="#"><i
												class="fas fa-user fa-sm fa-fw me-2 text-gray-400"></i>&nbsp;Profile</a><a
											class="dropdown-item" href="#"><i
												class="fas fa-cogs fa-sm fa-fw me-2 text-gray-400"></i>&nbsp;Settings</a><a
											class="dropdown-item" href="#"><i
												class="fas fa-list fa-sm fa-fw me-2 text-gray-400"></i>&nbsp;Activity
											log</a>
										<div class="dropdown-divider"></div><a class="dropdown-item" href="#"><i
												class="fas fa-sign-out-alt fa-sm fa-fw me-2 text-gray-400"></i>&nbsp;Logout</a>
									</div>
								</div>
							</li>
						</ul>
					</div>
				</nav>
				{% block content %}{% endblock %}
			</div>
			<footer class="bg-white sticky-footer">
				<div class="container my-auto">
					<div class="text-center my-auto copyright"><span>Copyright © University Feedback Platform 2025</span></div>
				</div>
			</footer>
		</div><a class="border rounded d-inline scroll-to-top" href="#page-top"><i class="fas fa-angle-up"></i></a>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.bundle.min.js"></script>
	<script src="{% static 'js/script.min.js' %}"></script>
</body>
</html>
