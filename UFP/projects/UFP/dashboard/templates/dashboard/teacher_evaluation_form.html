<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Evaluation Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Teacher Evaluation Form</h1>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_comments" class="form-label">Your Comments</label>
                {{ form.comments }}
            </div>
            <div class="form-check mb-3">
                {{ form.is_anonymous }}
                <label for="id_is_anonymous" class="form-check-label">Submit Anonymously</label>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
</body>
</html>
