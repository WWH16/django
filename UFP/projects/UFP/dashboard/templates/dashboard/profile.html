{% extends 'dashboard/feedback_form.html' %}
{% block dashboard_content %}
<div class="container py-4">
  <h2 class="text-success mb-4"><i class="bi bi-person-circle"></i> My Profile</h2>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title">Account Details</h5>
      <p><strong>Student ID:</strong> {{ user.username }}</p>
      <p><strong>Full Name:</strong> {{ user.first_name }}</p>
      <p><strong>Email:</strong> {{ user_email }}</p>
    </div>
  </div>

  <div class="d-flex gap-2">
    <a href="#" class="btn btn-outline-success" data-bs-toggle="modal" data-bs-target="#editProfileModal">
      <i class="bi bi-pencil"></i> Edit Profile
    </a>
    <a href="{% url 'give_feedback' %}" class="btn btn-success">
      <i class="bi bi-chat-dots"></i> Give Feedback
    </a>
  </div>
</div>

<!-- Edit Profile Modal -->
<div class="modal fade" id="editProfileModal" tabindex="-1" aria-labelledby="editProfileModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form method="post" action="{% url 'edit_profile' %}">
        {% csrf_token %}
        <div class="modal-header">
          <h5 class="modal-title" id="editProfileModalLabel">Edit Profile</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="first_name" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullname" name="fullname" value="{{ user.first_name }}" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" value="{{ user_email }}" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-success">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
